name: mnd_standalone_builder
description: Standalone Meander quest player with embedded quest. Build your own adventure app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  mnd_player:
    path: packages/mnd_player
  mnd_core:
    path: packages/mnd_core
  flutter_riverpod: ^2.5.1
  path_provider: ^2.0.15
  path: ^1.8.3
  archive: ^4.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/quest.mnd
